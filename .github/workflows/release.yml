name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: scientifique_calculator
            asset_name: scientifique-calculator-linux.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: scientifique_calculator.exe
            asset_name: scientifique-calculator-windows.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: scientifique_calculator
            asset_name: scientifique-calculator-macos.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} release/
          tar -czf ${{ matrix.asset_name }} -C release .

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" release/
          Compress-Archive -Path "release/*" -DestinationPath "${{ matrix.asset_name }}"

      - name: Package binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir release
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} release/
          tar -czf ${{ matrix.asset_name }} -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
